name: Auto Deploy Veille IA

on:
  push:
    paths:
      - 'inputs/**' # Se déclenche uniquement si on modifie les fichiers de veille
  workflow_dispatch: # Permet de lancer le script manuellement si besoin

permissions:
  contents: write # Autorise l'action à modifier index.html et les fichiers de veille

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Veille and Portal
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          # Génération avec le nom de fichier incluant la date du jour
          FILENAME="Veille_IA_$(date +'%Y-%m-%d').html"
          python generate_veille.py -o "$FILENAME"
          # Mise à jour de l'index
          python generate_portal.py

      - name: Display Teams Message
        run: |
          echo "### 📢 Message Teams à copier" >> $GITHUB_STEP_SUMMARY
          cat teams_announcement.md >> $GITHUB_STEP_SUMMARY        

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # On commit (s'il y a des changements)
          git commit -m "🚀 Auto-update: Nouvelle veille générée" || echo "No changes to commit"
          
          # LA CORRECTION EST ICI :
          # On récupère les dernières modifs distantes et on applique notre commit par-dessus
          git pull --rebase origin main
          
          git push origin main