name: CI - Lint, Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check veille_ia/ generate_veille.py generate_portal.py

      - name: Type check (mypy)
        run: mypy veille_ia/ --ignore-missing-imports

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short

      - name: Dry-run pipeline (no API call)
        run: python generate_veille.py --no-mistral --save-json -o dry_run_test.html
